name: Update GameState.json

on:
  repository_dispatch:
    types: [GameUpdateState]

permissions:
  contents: write

concurrency:
  group: json-save
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config user.name "GameBot"
          git config user.email "gamebot@example.com"

      - name: Pull latest changes
        run: git pull origin main --rebase

      - name: Update GameState.json
        run: |
          echo '${{ github.event.client_payload.data }}' > GameState.json

      - name: Commit
        run: |
          git add GameState.json
          git commit -m "Update GameState.json (auto-save)" || echo "No changes"

      - name: Push
        run: git push origin main
        
