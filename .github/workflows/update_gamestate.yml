name: Update GameState.json

on:
  repository_dispatch:
    types: [GameUpdateState]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Git
        run: |
          git config user.name "GameBot"
          git config user.email "gamebot@example.com"

      - name: Update GameState.json
        run: |
          echo '${{ github.event.client_payload.data }}' > GameState.json

      - name: Commit and push
        run: |
          git add GameState.json
          git commit -m "Update GameState.json (auto-save)"
          git push
