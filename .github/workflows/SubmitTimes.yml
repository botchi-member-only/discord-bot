name: Update SubmitTimes.json

on:
  repository_dispatch:
    types: [SubmitTimeUpdate]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Git
        run: |
          git config user.name "GameBot"
          git config user.email "gamebot@example.com"

      - name: Update SubmitTimes.json
        run: |
          echo '${{ github.event.client_payload.data }}' > SubmitTimes.json

      - name: Commit and push
        run: |
          git add SubmitTimes.json
          git commit -m "Update SubmitTimes.json (auto-save)"
          git push
