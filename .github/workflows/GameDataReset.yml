name: Reset Game Data

on:
  repository_dispatch:
    types: [GameDataReset]

permissions:
  contents: write

concurrency:
  group: json-save
  cancel-in-progress: false

jobs:
  reset:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config user.name "GameBot"
          git config user.email "gamebot@example.com"

      - name: Pull latest changes
        run: git pull origin main --rebase

      - name: Reset JSON files
        run: |
          echo '{}' > GameState.json
          echo '{"records":[]}' > TimeRecords.json
          echo '{}' > GameParticipants.json

      - name: Commit
        run: |
          git add GameState.json TimeRecords.json GameParticipants.json
          git commit -m "Reset game data (auto)" || echo "No changes"

      - name: Push
        run: git push origin main
