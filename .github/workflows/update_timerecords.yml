name: Update TimeRecords.json

on:
  repository_dispatch:
    types: [TimeRecordUpdate]

permissions:
  contents: write

# ★ 同時実行防止
concurrency:
  group: timerecords-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # ★ 履歴を全部取る（重要）

      - name: Set up Git
        run: |
          git config user.name "GameBot"
          git config user.email "gamebot@example.com"

      - name: Pull latest changes
        run: |
          git pull origin main --rebase

      - name: Update TimeRecords.json
        run: |
          echo '${{ github.event.client_payload.data }}' > TimeRecords.json

      - name: Commit and push
        run: |
          git add TimeRecords.json
          git commit -m "Update TimeRecords.json (auto-save)" || echo "No changes to commit"
          git pull origin main --rebase
          git push origin main
